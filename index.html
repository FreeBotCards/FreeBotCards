<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeBotCards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>FreeBotCards</h1>
    <p class="tagline">Curated character cards for SillyTavern</p>
  </header>
  <main class="authors-grid">
    <!-- ADD AUTHORS HERE - copy this block for each author -->
    <a href="alice/" class="author-card">
      <img src="alice/alice.png" alt="Alice" loading="lazy">
      <span class="author-name">Alice</span>
    </a>
    <a href="bob/" class="author-card">
      <img src="bob/bob.png" alt="Bob" loading="lazy">
      <span class="author-name">Bob</span>
    </a>
  </main>
  <footer>
    <p>All cards by their respective creators. <a href="https://github.com/FreeBotCards/FreeBotCards">Source</a></p>
  </footer>
</body>
</html>
